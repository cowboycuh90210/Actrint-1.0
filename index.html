<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actrint | Pro. Beyond.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="apple-nav">
        <div class="nav-content">
            <a href="#" class="logo"></a>
            <div class="links">
                <a href="#">Store</a>
                <a href="#">Mac</a>
                <a href="#">iPad</a>
                <a href="#">iPhone</a>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-text">
            <h1>Actrint Pro</h1>
            <h2>Hello, Apple Intelligence.</h2>
            <div class="cta-group">
                <a href="#" class="btn-primary">Learn more ></a>
                <a href="#" class="btn-secondary">Buy ></a>
            </div>
        </div>
        <div class="product-image"></div>
    </section>

    <section class="grid-wrapper">
        <div class="bento-grid">
            <div class="tile tile-dark">
                <div class="tile-content">
                    <h3>Titanium</h3>
                    <p>Strong. Light. Pro.</p>
                </div>
            </div>
            <div class="tile tile-light">
                <div class="tile-content">
                    <h3>M3 Chip</h3>
                    <p>Scary fast performance.</p>
                </div>
            </div>
            <div class="tile tile-image-1">
                <div class="tile-content">
                    <h3>Camera</h3>
                    <p>Details you won't believe.</p>
                </div>
            </div>
            <div class="tile tile-image-2">
                <div class="tile-content">
                    <h3>Battery</h3>
                    <p>Go all day. And night.</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
